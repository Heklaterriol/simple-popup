MOD_POPUP="Simple Popup"
MOD_SIMPLEPOPUP_XML_DESCRIPTION="Konfigurierbares Popup-Modul: Breite/Höhe (automatisch, Pixel, %, voll), vertikale/horizontale Position, Verzögerung in Millisekunden, einmalige oder wiederholte Anzeige, Hintergrundabdunkelung, Hintergrundfarbe, Rand und Schatten. Optional kann das gesamte Popup als ein einziger Link fungieren."
